name: Auto-generate Blog Post

on:
  schedule:
    # Runs every Monday and Thursday at 9:00 AM UTC
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "Nutrilogix Bot"
          git config user.email "bot@nutrilogix.app"
          git add src/data/generatedPosts.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "content(blog): auto-generate new blog post [skip ci]"
            git push
          fi
